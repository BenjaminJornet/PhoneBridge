name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PhoneBridge ${{ github.ref_name }}
          releaseBody: |
            PhoneBridge v0.0.1-alpha is the first public alpha release.

            This build focuses on local Android backup recovery and exploration:
            - Index local folders and Android backup exports.
            - Deduplicate files by content while preserving provenance.
            - Explore photos, videos, music, documents, structured records, apps, and selected SmartSwitch/WhatsApp data locally.
            - Pull media from Android devices over ADB with explicit user action.
            - Keep all data on your machine with no cloud sync or analytics.

            Download the installer for your platform below. This is an alpha release, so please keep an original backup of your data and report issues on GitHub.

            macOS users may need to remove the quarantine attribute after downloading:
            `xattr -cr /Applications/PhoneBridge.app`
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
