<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" role="img" aria-label="PhoneBridge app mockup">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEF0FB"/>
      <stop offset="1" stop-color="#E7EAFA"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="brandBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="tileA" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#C7D2FE"/><stop offset="1" stop-color="#A5B4FC"/></linearGradient>
    <linearGradient id="tileB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#BAE6FD"/><stop offset="1" stop-color="#7DD3FC"/></linearGradient>
    <linearGradient id="tileC" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#DDD6FE"/><stop offset="1" stop-color="#C4B5FD"/></linearGradient>
    <linearGradient id="tileD" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#A7F3D0"/><stop offset="1" stop-color="#6EE7B7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#1B1F3B" flood-opacity="0.16"/>
    </filter>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#1B1F3B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bgGrad)"/>

  <!-- App window -->
  <g filter="url(#shadow)">
    <rect x="80" y="64" width="1120" height="672" rx="24" fill="#FFFFFF"/>
  </g>
  <rect x="80" y="64" width="1120" height="672" rx="24" fill="none" stroke="#1B1F3B" stroke-opacity="0.06"/>

  <!-- Sidebar -->
  <path d="M80 88 a24 24 0 0 1 24-24 H300 V736 H104 a24 24 0 0 1 -24-24 Z" fill="url(#side)"/>

  <!-- Logo -->
  <rect x="124" y="104" width="46" height="46" rx="13" fill="url(#brand)"/>
  <path d="M138 132 C 144 124, 156 124, 162 132" stroke="#fff" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <circle cx="138" cy="132" r="6" fill="#fff"/><circle cx="162" cy="132" r="6" fill="#fff"/>
  <text x="184" y="124" fill="#FFFFFF" font-size="18" font-weight="800" letter-spacing="-0.02em">PhoneBridge</text>
  <text x="184" y="142" fill="#A5A9D8" font-size="11.5">Local Android recovery</text>

  <!-- Nav -->
  <rect x="120" y="186" width="160" height="40" rx="11" fill="#FFFFFF" fill-opacity="0.12"/>
  <text x="138" y="211" fill="#FFFFFF" font-size="14" font-weight="600">Dashboard</text>
  <text x="138" y="259" fill="#C7CAEC" font-size="14">Sync</text>
  <text x="138" y="299" fill="#C7CAEC" font-size="14">Gallery</text>
  <text x="138" y="339" fill="#C7CAEC" font-size="14">Data</text>
  <text x="138" y="379" fill="#C7CAEC" font-size="14">Cleanup</text>

  <!-- Privacy chip -->
  <rect x="120" y="660" width="160" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.08"/>
  <circle cx="142" cy="686" r="6" fill="#34D399"/>
  <text x="158" y="682" fill="#FFFFFF" font-size="12" font-weight="700">100% local</text>
  <text x="158" y="699" fill="#A5A9D8" font-size="10.5">no cloud · no analytics</text>

  <!-- Main: header -->
  <text x="340" y="132" fill="#7A8398" font-size="13" font-weight="600" letter-spacing="0.08em">OVERVIEW</text>
  <text x="340" y="172" fill="#1B1F3B" font-size="34" font-weight="800" letter-spacing="-0.03em">Recover, unify, reclaim.</text>
  <text x="340" y="200" fill="#525A7A" font-size="14.5">One deduplicated library across every backup — purge the old ones without losing a thing.</text>

  <!-- Stat cards -->
  <g filter="url(#cardShadow)">
    <rect x="340" y="224" width="195" height="116" rx="18" fill="#FFFFFF"/>
    <rect x="551" y="224" width="195" height="116" rx="18" fill="#FFFFFF"/>
    <rect x="762" y="224" width="195" height="116" rx="18" fill="#FFFFFF"/>
    <rect x="973" y="224" width="187" height="116" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="362" y="256" fill="#7A8398" font-size="12">Unified library</text>
  <text x="362" y="294" fill="#1B1F3B" font-size="28" font-weight="800" letter-spacing="-0.03em">38,402</text>
  <text x="362" y="316" fill="#7A8398" font-size="11.5">files · 96.1 GB</text>

  <text x="573" y="256" fill="#7A8398" font-size="12">Duplicates removed</text>
  <text x="573" y="294" fill="#4F46E5" font-size="28" font-weight="800" letter-spacing="-0.03em">4,812</text>
  <text x="573" y="316" fill="#7A8398" font-size="11.5">across 3 backups</text>

  <text x="784" y="256" fill="#7A8398" font-size="12">Reclaimable</text>
  <text x="784" y="294" fill="#10B981" font-size="28" font-weight="800" letter-spacing="-0.03em">18.4 GB</text>
  <text x="784" y="316" fill="#7A8398" font-size="11.5">2 backups purgeable</text>

  <text x="995" y="256" fill="#7A8398" font-size="12">Devices</text>
  <text x="995" y="294" fill="#1B1F3B" font-size="28" font-weight="800" letter-spacing="-0.03em">2</text>
  <text x="995" y="316" fill="#7A8398" font-size="11.5">Galaxy · Pixel</text>

  <!-- Consolidation band -->
  <g filter="url(#cardShadow)">
    <rect x="340" y="362" width="406" height="194" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="362" y="392" fill="#1B1F3B" font-size="15" font-weight="700">Consolidation</text>
  <text x="362" y="412" fill="#7A8398" font-size="12">3 backups → 1 deduplicated library</text>

  <!-- source chips -->
  <g>
    <rect x="362" y="430" width="120" height="34" rx="9" fill="#EEF2FF"/>
    <circle cx="380" cy="447" r="5" fill="#6366F1"/>
    <text x="394" y="451" fill="#3730A3" font-size="11.5" font-weight="600">SM-F936B · Apr</text>
    <rect x="362" y="470" width="120" height="34" rx="9" fill="#EEF2FF"/>
    <circle cx="380" cy="487" r="5" fill="#6366F1"/>
    <text x="394" y="491" fill="#3730A3" font-size="11.5" font-weight="600">SM-F936B · Jan</text>
    <rect x="362" y="510" width="120" height="34" rx="9" fill="#EEF2FF"/>
    <circle cx="380" cy="527" r="5" fill="#22D3EE"/>
    <text x="394" y="531" fill="#3730A3" font-size="11.5" font-weight="600">Pixel · Takeout</text>
  </g>

  <!-- flow arrows -->
  <path d="M488 447 C 540 460, 540 460, 580 480" stroke="#A5B4FC" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M488 487 H 578" stroke="#A5B4FC" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M488 527 C 540 514, 540 514, 580 494" stroke="#A5B4FC" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- library target -->
  <rect x="586" y="446" width="140" height="64" rx="14" fill="url(#brandBtn)"/>
  <text x="656" y="476" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">Library</text>
  <text x="656" y="494" fill="#E0E7FF" font-size="10.5" text-anchor="middle">1 copy per file</text>

  <!-- Gallery preview -->
  <g filter="url(#cardShadow)">
    <rect x="762" y="362" width="398" height="194" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="784" y="392" fill="#1B1F3B" font-size="15" font-weight="700">Gallery</text>
  <text x="1138" y="392" fill="#7A8398" font-size="12" text-anchor="end">recent</text>
  <rect x="784" y="408" width="84" height="84" rx="12" fill="url(#tileA)"/>
  <rect x="878" y="408" width="84" height="84" rx="12" fill="url(#tileB)"/>
  <rect x="972" y="408" width="84" height="84" rx="12" fill="url(#tileC)"/>
  <rect x="1066" y="408" width="74" height="84" rx="12" fill="url(#tileD)"/>
  <rect x="784" y="502" width="356" height="12" rx="6" fill="#EEF2FF"/>
  <rect x="784" y="524" width="220" height="12" rx="6" fill="#F1F5F9"/>

  <!-- primary action -->
  <rect x="340" y="576" width="220" height="46" rx="13" fill="url(#brandBtn)"/>
  <text x="450" y="604" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">Consolidate backups</text>
  <rect x="576" y="576" width="170" height="46" rx="13" fill="#FFFFFF" stroke="#1B1F3B" stroke-opacity="0.12"/>
  <text x="661" y="604" fill="#1B1F3B" font-size="14" font-weight="600" text-anchor="middle">Review purgeable</text>
</svg>
