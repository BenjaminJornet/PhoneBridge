<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PhoneBridge icon">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#sheen)"/>

  <!-- bridge arc linking two devices -->
  <path d="M136 196 C 200 120, 312 120, 376 196" stroke="#ffffff" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- two device nodes -->
  <circle cx="136" cy="196" r="30" fill="#ffffff"/>
  <circle cx="376" cy="196" r="30" fill="#ffffff"/>
  <circle cx="136" cy="196" r="13" fill="#4F46E5"/>
  <circle cx="376" cy="196" r="13" fill="#4F46E5"/>

  <!-- flow lines converging downward into the unified library -->
  <path d="M136 226 C 150 300, 220 312, 256 322" stroke="#ffffff" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M376 226 C 362 300, 292 312, 256 322" stroke="#ffffff" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M256 250 L256 322" stroke="#ffffff" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- unified library container -->
  <rect x="176" y="320" width="160" height="116" rx="26" fill="#ffffff"/>
  <rect x="176" y="320" width="160" height="116" rx="26" fill="#1E1B4B" opacity="0.06"/>
  <rect x="200" y="350" width="112" height="14" rx="7" fill="#4F46E5"/>
  <rect x="200" y="378" width="112" height="14" rx="7" fill="#22D3EE"/>
  <rect x="200" y="406" width="72" height="14" rx="7" fill="#A855F7"/>
</svg>
